<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0710" />
  <title>Pet Planner</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">YOUR PETS</p>
        <h1>Pet Planner</h1>
      </div>
      <button id="openAddPet" class="icon-button" aria-label="Add pet">＋</button>
    </header>

    <section>
      <div id="petList" class="pet-list"></div>
    </section>

    <section id="emptyState" class="empty-state" hidden>
      <div class="empty-icon">🐾</div>
      <h2>No pets yet</h2>
      <p>Add your first pet to create their dashboard.</p>
      <button id="emptyAddPet">Add a pet</button>
    </section>

    <section id="dashboard" class="dashboard" hidden>
      <div class="profile-card">
        <div id="petAvatar" class="avatar">🐾</div>
        <div class="profile-info">
          <p id="petSpecies" class="eyebrow"></p>
          <h2 id="petName"></h2>
          <p id="petMeta" class="muted"></p>
        </div>
        <button id="deletePet" class="delete-button" aria-label="Delete pet">🗑️</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Sex</span>
          <strong id="petSex">—</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Weight</span>
          <strong id="petWeight">—</strong>
        </div>
      </div>

      <div class="feature-grid">
        <button class="feature-card" data-feature="feeding">🍽️<span>Feeding</span></button>
        <button class="feature-card" data-feature="health">❤️<span>Health</span></button>
        <button class="feature-card" data-feature="gallery">📸<span>Gallery</span></button>
        <button class="feature-card" data-feature="notes">📝<span>Notes</span></button>
        <button class="feature-card" data-feature="growth">📈<span>Growth</span></button>
        <button class="feature-card" data-feature="builder">🏗️<span id="builderLabel">Habitat Builder</span><small>Coming soon</small></button>
      </div>

      <p id="featureMessage" class="feature-message"></p>
    </section>
  </main>

  <dialog id="petDialog">
    <form id="petForm" method="dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">NEW PROFILE</p>
          <h2>Add a pet</h2>
        </div>
        <button type="button" id="closeDialog" class="icon-button small">×</button>
      </div>

      <label>
        Pet name
        <input id="nameInput" name="name" required maxlength="30" placeholder="e.g. Squirtle" />
      </label>

      <label>
        Animal type
        <select id="speciesInput" name="species" required>
          <option value="">Choose one</option>
          <option>Turtle</option>
          <option>Fish</option>
          <option>Dog</option>
          <option>Cat</option>
          <option>Bird</option>
          <option>Snake</option>
          <option>Lizard</option>
          <option>Rabbit</option>
          <option>Small animal</option>
          <option>Horse</option>
          <option>Other</option>
        </select>
      </label>

      <label>
        Breed or species
        <input id="breedInput" name="breed" maxlength="50" placeholder="Optional" />
      </label>

      <div class="two-column">
        <label>
          Birthday
          <input id="birthdayInput" name="birthday" type="date" />
        </label>

        <label>
          Sex
          <select id="sexInput" name="sex">
            <option value="">Unknown</option>
            <option>Female</option>
            <option>Male</option>
          </select>
        </label>
      </div>

      <label>
        Weight
        <input id="weightInput" name="weight" maxlength="20" placeholder="e.g. 850 g" />
      </label>

      <button type="submit" class="primary-button">Save pet</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
